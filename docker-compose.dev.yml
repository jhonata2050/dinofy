services:
  master:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8099:80"
    volumes:
      - master_storage:/var/www/html/storage
    environment:
      APP_NAME: "Dinofy Master"
      APP_ENV: local
      APP_DEBUG: "false"
      APP_URL: "http://localhost:8099"
      APP_KEY: "base64:zQ2ypS2P+GJ1dzVH12ZoYX3FHRmR5MjU89k+4+dhYmA="
      DB_CONNECTION: mysql
      DB_HOST: master-mysql
      DB_PORT: "3306"
      DB_DATABASE: dinofy_master
      DB_USERNAME: master
      DB_PASSWORD: master_secret
      SESSION_DRIVER: database
      CACHE_STORE: file
      LOG_CHANNEL: stderr
      BASE_DOMAIN: dinofy.app
      DINOFY_IMAGE: dinofy_app:latest
      TENANT_DATA_PATH: /srv/tenants
    depends_on:
      master-mysql:
        condition: service_healthy
    networks:
      - master-internal

  master-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: dinofy_master
      MYSQL_USER: master
      MYSQL_PASSWORD: master_secret
    volumes:
      - master_mysql_data:/var/lib/mysql
    ports:
      - "33090:3306"
    networks:
      - master-internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -umaster -pmaster_secret --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

networks:
  master-internal:
    driver: bridge

volumes:
  master_storage:
  master_mysql_data:
