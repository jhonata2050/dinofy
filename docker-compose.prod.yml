services:
  traefik:
    image: traefik:v3.4
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"
      - "--entrypoints.web.address=:80"
      - "--log.level=WARN"
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-public

  master:
    build:
      context: .
      dockerfile: Dockerfile
    image: dinofy_master:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - master_storage:/var/www/html/storage
      - /srv/tenants:/srv/tenants
    env_file:
      - .env
    depends_on:
      master-mysql:
        condition: service_healthy
    networks:
      - traefik-public
      - master-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.master.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.master.entrypoints=web"
      - "traefik.http.services.master.loadbalancer.server.port=80"

  master-mysql:
    image: mysql:8.0
    restart: unless-stopped
    command:
      - "--innodb-buffer-pool-size=128M"
      - "--innodb-log-file-size=32M"
      - "--max-connections=50"
    environment:
      MYSQL_ROOT_PASSWORD: ${MASTER_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - master_mysql_data:/var/lib/mysql
    networks:
      - master-internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

networks:
  traefik-public:
    name: traefik-public
    driver: bridge
  master-internal:
    driver: bridge

volumes:
  master_storage:
  master_mysql_data:
