services:
  master:
    build:
      context: .
      dockerfile: Dockerfile
    image: dinofy_master:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - master_storage:/var/www/html/storage
      - /srv/tenants:/srv/tenants
    env_file:
      - .env
    depends_on:
      master-mysql:
        condition: service_healthy
    networks:
      - master-internal

  master-mysql:
    image: mysql:8.0
    restart: unless-stopped
    command:
      - "--innodb-buffer-pool-size=128M"
      - "--innodb-log-file-size=32M"
      - "--max-connections=50"
    environment:
      MYSQL_ROOT_PASSWORD: ${MASTER_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - master_mysql_data:/var/lib/mysql
    networks:
      - master-internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

networks:
  master-internal:
    driver: bridge

volumes:
  master_storage:
  master_mysql_data:
